name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  prettier:
    name: JS/HTML/CSS — Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Prettier
        run: npm install -g prettier

      - name: Check formatting (Prettier)
        run: prettier --check .

  python-checks:
    name: Python — Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint (Ruff)
        run: ruff check .

      - name: Check formatting (Ruff)
        run: ruff format --check .
